<!DOCTYPE html>
<html>
<head>
<title>LabMonitor - Plotter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="icon" href="./icon.png">
<link rel="apple-touch-icon" href="./icon180.png">
<link rel="manifest" href="./manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
<style>
    body {
        font-family: Helvetica, sans-serif;
        text-align: center;
        background-color: #f0f0f0;
        padding: 10px;
    }
    .chart-container {
        width: 90%;
        max-width: 1000px;
        margin: 20px auto;
        background-color: white;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    fieldset {
        background-color: #C0C0C0;
        max-width: 600px;
        margin: 10px auto;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        align-items: center;
    }
    button, input[type="number"], input[type="text"] {
        font-size: 16px;
        padding: 8px 12px;
        border-radius: 8px;
        border: 2px solid #aaa;
    }
    button {
        background-color: #155084;
        color: white;
        cursor: pointer;
        border-color: #155084;
    }
    button:hover {
        background-color: #1e62a0;
    }
    button#toggleButton.stopped {
        background-color: #006400; /* Green for 'Start' */
        border-color: #006400;
    }

    button#clearButton {
        background-color: #a02c2c; /* Dark red */
        border-color: #a02c2c;
    }
    button#clearButton:hover {
        background-color: #c93434;
    }

    input[type="number"] {
        width: 60px;
        text-align: center;
    }
    input[type="text"] {
        width: 400px;
    }
    .checkbox-group legend {
        width: 100%; /* Ensure legend is on its own line */
        font-weight: bold;
    }
    .checkbox-group label {
        margin-right: 10px;
    }
    .two-column-layout {
        display: flex;
        gap: 5px;
        text-align: left;
        font-size: 18px;
        width: 100%;
    }
    .column {
        flex: 1;
        padding-left: 10px;
    }
    fieldset span {
        min-width: 50px;
        display: inline-block;
        font-weight: 700;
        color: #00008B; /* Dark blue for values */
    }
    small { display: block; margin-top: 5px; }
</style>
</head>
<body>
<div class="chart-container">
    <canvas id="sensorChart"></canvas>
</div>

<fieldset>
    <legend style="width: 100%; text-align: center; font-weight: bold;">
        <span id="device_name"></span>   <span id="datetime_current">Time N/A</span>
    </legend>
    <div class="two-column-layout">
        <div class="column">
            <strong>Sensor 1:</strong>
            <br>Temperature:
            <br>RH:
            <br>Wet Bulb T:
            <br>Heat Index:
        </div>
        <div class="column">
            <br>
            <span id="sens1_Temp_current">...</span>
            <br><span id="sens1_RH_current">...</span>
            <br><span id="sens1_WBT_current">...</span>
            <br><span id="sens1_HI_current">...</span>
        </div>
        <div class="column">
            <strong>Sensor 2:</strong>
            <br>Temperature:
            <br><br><strong>Sensor 3:</strong>
            <br>Temperature:
        </div>
        <div class="column">
            <br>
            <span id="sens2_Temp_current">...</span>
            <br><br><br>
            <span id="sens3_Temp_current">...</span>
        </div>
    </div>
</fieldset>

<fieldset>
    Comments: <input type="text" id="userComment">
</fieldset>

<fieldset>
    <label for="refreshRate">Refresh (secs):</label>
    <input type="number" id="refreshRate" value="30" min="1">
    
    <button id="toggleButton" class="stopped">Start</button>
    <button id="clearButton">Clear Plot</button>
    <div style="width: 100%; text-align: center;">
    <button id="zoomButton">Toggle Pan/Zoom</button>
    <button id="resetZoomButton">Reset Zoom</button>
    </div>
    <div style="width: 100%; text-align: center;">
    <button id="savePngButton">Save Plot as PNG</button>
    <button id="saveCsvButton">Save Data as CSV</button>
    </div>
    
    <div style="width: 100%; text-align: center;">
    <input type="checkbox" id="submitMongo-checkbox" checked>Save to Remote Server
    </div>
    </fieldset>
<fieldset class="checkbox-group">
    <label>
        <input type="checkbox" class="data-checkbox" data-key="sens1_Temp" data-color="red" checked>
        Sensor 1 Temp
    </label>
    <label>
        <input type="checkbox" class="data-checkbox" data-key="sens2_Temp" data-color="green" checked>
        Sensor 2 Temp
    </label>
    <label>
        <input type="checkbox" class="data-checkbox" data-key="sens1_WBT" data-color="purple" checked>
        Sensor 1 WBT
    </label>
    <label>
        <input type="checkbox" class="data-checkbox" data-key="sens1_RH" data-color="blue">
        Sensor 1 RH
    </label>
    <label>
        <input type="checkbox" class="data-checkbox" data-key="sens1_HI" data-color="blue">
        Sensor 1 HI
    </label>
    <label>
        <input type="checkbox" class="data-checkbox" data-key="sens3_Temp" data-color="brown">
        Sensor 3 Temp
    </label>
</fieldset>

<button id="simpleUIBtn">Simple UI</button>

<small><small>Device IP: <span id="ip_address">N/A</span></small></small>
<small><small>Version: <span id="version">N/A</span></small></small>

<script type="text/javascript">
//////////////////////////////////////////////
// Global definitions
//////////////////////////////////////////////
let sensorChart;
let isCollecting = false;
let hoveredDataIndex = -1;

// Timeout variables to fix promise pile-up
let pollingTimer = null;

// DOM Element Cache
const domCache = {};

//////////////////////////////////////////////
// This object will store ALL data points
//////////////////////////////////////////////
const chartDataStore = {
    labels: [], 
    isoLabels: [],  
    sens1_Temp: [],
    sens1_RH: [],
    sens1_HI: [],
    sens1_WBT: [],
    sens2_Temp: [],
    sens2_RH: [],
    sens3_Temp: [],
    sens3_RH: [],
    userComments: []
};

function getCurrentDateTimeUTC(UTC) {
    const dateObject = new Date(Math.round(UTC / 1e6));
    return dateObject.toLocaleString();
}

function getWebBulbTemp(temp, rh, type) {
    if (type === 'sensor') {
        const T = parseFloat(temp);
        const RH = parseFloat(rh);
        if (isNaN(T) || isNaN(RH)) return "--";
        
        let term1 = T * Math.atan(0.151977 * Math.sqrt(RH + 8.313659));
        let term2 = Math.atan(T + RH);
        let term3 = Math.atan(RH - 1.676331);
        let term4 = 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH);
        let term5 = 4.686035;
        let Tw = term1 + term2 - term3 + term4 - term5;
        return Tw.toFixed(1);
    } else {
        return "--";
    }
}

function initChart() {
    const ctx = document.getElementById('sensorChart').getContext('2d');
    sensorChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [] },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                x: {
                    type: 'time',
                    time: {
                        unit: 'second',
                        displayFormats: { second: 'HH:mm:ss' }
                    },
                    title: { display: true, text: 'Time' }
                },
                y: {
                    title: { display: true, text: 'Value' },
                    beginAtZero: false
                }
            },
            onHover: (event, elements, chart) => {
                if (elements.length > 0) {
                    hoveredDataIndex = elements[0].index;
                } else {
                    hoveredDataIndex = -1;
                }
                chart.draw(); 
            },
            plugins: {
                legend: { position: 'top' },
                tooltip: { enabled: false },
                zoom: {
                    zoom: {
                        wheel: { enabled: false },
                        pinch: { enabled: false },
                        drag: {
                            enabled: true,
                            borderColor: 'rgba(60, 60, 60, 0.5)',
                            borderWidth: 1,
                            backgroundColor: 'rgba(60, 60, 60, 0.2)',
                            modifierKey: null,
                        },
                        mode: 'xy',
                    },
                    pan: {
                        enabled: true,
                        mode: 'xy',
                        modifierKey: null,
                    }
                },
            },
            animation: false
        }
    });
}

async function fetchData(flag) {
    try {
        const url = '/api/status?submitMongo='+flag;
        console.log(`Requesting data with: `+ url);
        const response = await fetch(url);
        const data = await response.json();
        return data;
    } catch (error) {
        console.error('Error fetching status:', error);
        stopInterval();
        domCache.toggleBtn.textContent = "Start (Error)";
        domCache.toggleBtn.classList.add("stopped");
    }
}

async function updatePlot(flag) {
    if (!isCollecting  && flag) return;

    if (!domCache.submitMongoCheckbox.checked) {
        flag = false;
    }
        
    const data = await fetchData(flag);
    if (!data) return;

    const timestamp = new Date(Math.round(data.UTC / 1e6));

    const datetime = getCurrentDateTimeUTC(data.UTC);
    const s1_Temp = parseFloat(data.sens1_Temp) || null;
    const s1_RH = parseFloat(data.sens1_RH) || null;
    const s1_HI = parseFloat(data.sens1_HI) || null;
    const s2_Temp = parseFloat(data.sens2_Temp) || null;
    const s2_RH = parseFloat(data.sens2_RH) || null;
    const s3_Temp = parseFloat(data.sens3_Temp) || null;
    const s3_RH = parseFloat(data.sens3_RH) || null;
    const s1_WBT_string = getWebBulbTemp(data.sens1_Temp, data.sens1_RH, data.sens1_type);
    const s1_WBT = parseFloat(s1_WBT_string) || null;
    
    let userComment = "No comment"; 
    if (domCache.userComment && domCache.userComment.value) {
        userComment = domCache.userComment.value.trim();
        if (userComment === "") userComment = "No comment";
    }
            
    // Update Cached DOM
    domCache.deviceName.textContent = data.device_name;
    domCache.datetimeCurrent.textContent = datetime;
    domCache.sens1Temp.textContent = data.sens1_Temp + " \u00B0C";
    domCache.sens1Temp.style.color = (data.sens1_type != "sensor") ? "red" : "#00008B";
    domCache.sens1HI.textContent = data.sens1_HI + " \u00B0C";
    domCache.sens1HI.style.color = (data.sens1_type != "sensor") ? "red" : "#00008B";
    domCache.sens1RH.textContent = data.sens1_RH + " %";
    domCache.sens1WBT.textContent = s1_WBT_string + " \u00B0C"; 
    domCache.sens2Temp.textContent = data.sens2_Temp + " \u00B0C";
    domCache.sens2Temp.style.color = (data.sens2_type != "sensor") ? "red" : "#00008B";
    domCache.sens3Temp.textContent = data.sens3_Temp + " \u00B0C";
    domCache.sens3Temp.style.color = (data.sens3_type != "sensor") ? "red" : "#00008B";
    domCache.ipAddress.textContent = data.ip;
    domCache.version.textContent = data.version;

    if (flag) { 
        chartDataStore.labels.push(timestamp);
        chartDataStore.isoLabels.push(timestamp.toISOString());
        chartDataStore.sens1_Temp.push(s1_Temp);
        chartDataStore.sens1_RH.push(s1_RH);
        chartDataStore.sens1_HI.push(s1_HI);
        chartDataStore.sens1_WBT.push(s1_WBT);
        chartDataStore.sens2_Temp.push(s2_Temp);
        chartDataStore.sens2_RH.push(s2_RH);
        chartDataStore.sens3_Temp.push(s3_Temp);
        chartDataStore.sens3_RH.push(s3_RH);
        chartDataStore.userComments.push(userComment);

        sensorChart.data.labels.push(timestamp);
        sensorChart.data.datasets.forEach(dataset => {
            const key = dataset.label;
            if (key === 'sens1_Temp') dataset.data.push(s1_Temp);
            if (key === 'sens1_RH') dataset.data.push(s1_RH);
            if
